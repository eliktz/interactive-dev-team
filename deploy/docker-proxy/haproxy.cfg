# =============================================================================
# haproxy.cfg — squad-scoped docker-socket-proxy ACL (OPT-IN hardening)
#
# Source of truth for the `docker-proxy` service (compose profile
# `socket-proxy`). Mounted over the Tecnativa image's
# /usr/local/etc/haproxy/haproxy.cfg.template — its entrypoint seds
# ${BIND_CONFIG} below and runs the result, so this file REPLACES the stock
# env-templated policy. Structure mirrors the stock template (same backends,
# same env() knobs where kept) so operators familiar with
# tecnativa/docker-socket-proxy can read it.
#
# ENV SUBSTITUTION — two different mechanisms, deliberately:
#   1. ${BIND_CONFIG} is the ONLY variable the Tecnativa entrypoint seds into
#      the template before launching haproxy.
#   2. Every OTHER $VAR/${VAR} here (SOCKET_PATH, LOG_LEVEL,
#      SQUAD_EXEC_ALLOW_REGEX) is expanded by HAPROXY ITSELF at config-parse
#      time from the process environment (configuration manual §2.3:
#      environment variables are expanded during parsing, both unquoted and
#      inside double quotes; '\$' inside double quotes stays a literal '$').
#      This is the same mechanism the stock template relies on for
#      $SOCKET_PATH. The compose service's `environment:` block delivers
#      SQUAD_EXEC_ALLOW_REGEX into that environment. If the variable is
#      UNSET, it expands to empty and the per-container allow regex below can
#      never match — FAIL CLOSED (verified empirically; see
#      EXEC_TEST_RESULT.md addendum). The squad-scope ACL stage of
#      scripts/test-socket-proxy-exec.sh validates this substitution path
#      end-to-end against the real image + this exact file.
#
# Policy (plan §7.4):
#   DENY  — containers/create, images, build, volumes, networks, swarm,
#           secrets, configs, plugins, session, commit, system, distribution
#   ALLOW — exec/inspect/start (+ restart for the wizard respawn, resize/
#           attach/wait/logs/top for the PTY flow) ONLY on containers whose
#           name matches ${SQUAD_EXEC_ALLOW_REGEX} (default in compose:
#           <project>-[a-z0-9-]+; tenant #1 extends it with the legacy
#           openclaw container) — plus the /exec/<id>/* continuation
#           endpoints, container list, ping/version/events for the CLI
#           handshake. Everything else falls through to the final deny.
#
# GATE: do not enable the profile unless the M5 empirical exec-hijack test
# passed — see deploy/docker-proxy/EXEC_TEST_RESULT.md.
#
# NOTE on regex syntax: [0-9.] character classes are used instead of \d so
# the config stays valid regardless of quoting and of the regex engine the
# haproxy binary was built with.
# =============================================================================

global
    log stdout format raw daemon "${LOG_LEVEL}"

    pidfile /run/haproxy.pid
    maxconn 4000

    # Turn on stats unix socket
    server-state-file /var/lib/haproxy/server-state

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option http-server-close
    option redispatch
    retries 3
    timeout http-request 10s
    timeout queue 1m
    timeout connect 10s
    timeout client 10m
    timeout server 10m
    timeout http-keep-alive 10s
    timeout check 10s
    maxconn 3000

    # Allow seamless reloads
    load-server-state-from-file global

    # Use provided example error pages
    errorfile 400 /usr/local/etc/haproxy/errors/400.http
    errorfile 403 /usr/local/etc/haproxy/errors/403.http
    errorfile 408 /usr/local/etc/haproxy/errors/408.http
    errorfile 500 /usr/local/etc/haproxy/errors/500.http
    errorfile 502 /usr/local/etc/haproxy/errors/502.http
    errorfile 503 /usr/local/etc/haproxy/errors/503.http
    errorfile 504 /usr/local/etc/haproxy/errors/504.http

backend dockerbackend
    server dockersocket $SOCKET_PATH

backend docker-events
    server dockersocket $SOCKET_PATH
    timeout server 0

frontend dockerfrontend
    bind ${BIND_CONFIG}

    # Writes only when POST is enabled (compose sets POST=1 for exec create/
    # start); GET always passes to the path ACLs below.
    http-request deny unless METH_GET || { env(POST) -m bool }

    # --- Hard denies FIRST (defense in depth — these never reach an allow) --
    # No container creation through the proxy, ever.
    http-request deny if { path,url_dec -m reg -i ^(/v[0-9.]+)?/containers/create }
    # No image/build/volume/network/swarm-control surface.
    http-request deny if { path,url_dec -m reg -i ^(/v[0-9.]+)?/(images|build|volumes|networks|swarm|secrets|configs|plugins|session|commit|system|distribution) }
    # No pruning or destructive bulk ops on containers.
    http-request deny if { path,url_dec -m reg -i ^(/v[0-9.]+)?/containers/prune }

    # --- CLI handshake / read-only plumbing -------------------------------
    http-request allow if { path,url_dec -m reg -i ^(/v[0-9.]+)?/_ping } { env(PING) -m bool }
    http-request allow if { path,url_dec -m reg -i ^(/v[0-9.]+)?/version } { env(VERSION) -m bool }
    http-request allow if { path,url_dec -m reg -i ^(/v[0-9.]+)?/events } { env(EVENTS) -m bool }

    # --- Containers (CONTAINERS=1 in compose) -----------------------------
    # List endpoint (no per-container scoping possible on a list path).
    # NOTE: regexes that end with the $ anchor MUST be double-quoted with \$ —
    # HAProxy only dequotes \$ to a literal $ inside double quotes; unquoted
    # \$ leaves a broken pattern that silently never matches (empirically
    # verified — the allowed-exec flow 403'd until these were quoted).
    http-request allow if { path,url_dec -m reg -i "^(/v[0-9.]+)?/containers/json\$" } { env(CONTAINERS) -m bool }
    # Per-container endpoints scoped to THIS SQUAD's containers only:
    # exec create, inspect, start/restart (wizard respawn), PTY plumbing
    # (resize/attach), wait/logs/top. Name regex comes from the squad .env
    # via the service environment (SQUAD_EXEC_ALLOW_REGEX) — expanded by
    # HAPROXY at config-parse time (NOT by the entrypoint sed; see the ENV
    # SUBSTITUTION header note). Unset ⇒ empty ⇒ never matches ⇒ fail closed.
    http-request allow if { path,url_dec -m reg -i "^(/v[0-9.]+)?/containers/${SQUAD_EXEC_ALLOW_REGEX}/(exec|json|start|restart|resize|attach|wait|logs|top)\$" } { env(CONTAINERS) -m bool }

    # --- Exec continuation endpoints (EXEC=1 in compose) ------------------
    # /exec/<id>/start|resize|json — the id is minted by the exec-create call
    # above, which is already squad-scoped.
    http-request allow if { path,url_dec -m reg -i "^(/v[0-9.]+)?/exec/[a-zA-Z0-9]+/(start|resize|json)\$" } { env(EXEC) -m bool }

    # Everything else: denied.
    http-request deny
    default_backend dockerbackend

    use_backend docker-events if { path,url_dec -m reg -i ^(/v[0-9.]+)?/events }
