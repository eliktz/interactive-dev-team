# =============================================================================
# haproxy.admin.cfg — BROAD platform-ADMIN docker-socket-proxy ACL
#
# Source of truth for the `admin-docker-proxy` service (deploy/admin/
# docker-compose.admin.yml, project `platform-admin`). Mounted over the
# Tecnativa image's /usr/local/etc/haproxy/haproxy.cfg.template — its entrypoint
# seds ${BIND_CONFIG} below and runs the result, so this file REPLACES the stock
# env-templated policy. Structure mirrors deploy/docker-proxy/haproxy.cfg (the
# squad ACL) so the two can be diffed.
#
# DIFFERENCE FROM THE SQUAD ACL: the allow set is BROADENED (the admin manages
# ALL squads — it legitimately CREATES and DELETES containers/networks/volumes
# and pulls images) and the per-container name-scoping regex is DROPPED.
#
# Policy (plan §2.1):
#   ALLOW — containers (incl. /create, /<id>/start|stop|kill|restart|wait|logs|
#           exec|json, DELETE), networks, volumes, images (read: pull/tag/
#           inspect/remove — NOT build), exec + exec-continuation, POST,
#           ping/version/events handshake, GET /info (read-only daemon probe —
#           squadctl have_docker()/doctor gate on `docker info`).
#   DENY  — build (builds go OUT-OF-BAND via admin-host-build.sh on the host),
#           swarm, secrets, configs, plugins, system, distribution, session,
#           commit. These stay HARD-denied (highest host-takeover blast radius).
#
# ENV SUBSTITUTION: ${BIND_CONFIG} is the ONLY variable the Tecnativa entrypoint
# seds in. There is intentionally NO SQUAD_EXEC_ALLOW_REGEX here — the admin is
# not name-scoped. Compose env on admin-docker-proxy:
#   CONTAINERS=1 EXEC=1 POST=1 NETWORKS=1 VOLUMES=1 IMAGES=1 INFO=1
#   (BUILD/SWARM/SECRETS/CONFIGS/PLUGINS/SYSTEM/DISTRIBUTION/SESSION left UNSET).
#
# HONEST POSTURE: with the admin agent on network_mode: host + container-create
# rights + /srv RW, this proxy is DEFENSE-IN-DEPTH, NOT a sandbox. It removes
# the highest-blast-radius API surface and gives one auditable file describing
# exactly what the admin may call. The admin's creds are root-on-the-VM.
#
# GATE: the admin-ACL stage of scripts/test-socket-proxy-exec.sh must PASS
# (incl. the `compose down -v` DELETE path = 204 and BUILD = 403) before
# trusting this proxy — see deploy/docker-proxy/EXEC_TEST_RESULT.md.
#
# NOTE on regex syntax: [0-9.] character classes instead of \d so the config
# stays valid regardless of quoting and of the haproxy regex engine. Regexes
# ending in the $ anchor MUST be double-quoted with \$ (HAProxy only dequotes
# \$ to a literal $ inside double quotes; an unquoted \$ silently never matches).
# =============================================================================

global
    log stdout format raw daemon "${LOG_LEVEL}"

    pidfile /run/haproxy.pid
    maxconn 4000

    # Turn on stats unix socket
    server-state-file /var/lib/haproxy/server-state

defaults
    mode http
    log global
    option httplog
    option dontlognull
    option http-server-close
    option redispatch
    retries 3
    timeout http-request 10s
    timeout queue 1m
    timeout connect 10s
    timeout client 10m
    timeout server 10m
    timeout http-keep-alive 10s
    timeout check 10s
    maxconn 3000

    # Allow seamless reloads
    load-server-state-from-file global

    # Use provided example error pages
    errorfile 400 /usr/local/etc/haproxy/errors/400.http
    errorfile 403 /usr/local/etc/haproxy/errors/403.http
    errorfile 408 /usr/local/etc/haproxy/errors/408.http
    errorfile 500 /usr/local/etc/haproxy/errors/500.http
    errorfile 502 /usr/local/etc/haproxy/errors/502.http
    errorfile 503 /usr/local/etc/haproxy/errors/503.http
    errorfile 504 /usr/local/etc/haproxy/errors/504.http

backend dockerbackend
    server dockersocket $SOCKET_PATH

backend docker-events
    server dockersocket $SOCKET_PATH
    timeout server 0

frontend dockerfrontend
    bind ${BIND_CONFIG}

    # Writes only when POST is enabled (compose sets POST=1); GET always passes
    # to the path ACLs below.
    http-request deny unless METH_GET || { env(POST) -m bool }

    # --- Hard denies FIRST (host-takeover surface — never reach an allow) ----
    # Builds go OUT-OF-BAND (admin-host-build.sh on the host); the admin runs
    # SQUADCTL_NO_BUILD=1 so no --build is ever issued. BUILD stays denied.
    http-request deny if { path,url_dec -m reg -i ^(/v[0-9.]+)?/build }
    # The full host-takeover control surface stays denied.
    http-request deny if { path,url_dec -m reg -i ^(/v[0-9.]+)?/(swarm|secrets|configs|plugins|session|commit|system|distribution) }

    # --- CLI handshake / read-only plumbing ---------------------------------
    http-request allow if { path,url_dec -m reg -i ^(/v[0-9.]+)?/_ping } { env(PING) -m bool }
    http-request allow if { path,url_dec -m reg -i ^(/v[0-9.]+)?/version } { env(VERSION) -m bool }
    http-request allow if { path,url_dec -m reg -i ^(/v[0-9.]+)?/events } { env(EVENTS) -m bool }
    # GET /info — read-only daemon probe. squadctl's have_docker()/doctor run
    # `docker info` to confirm the daemon is reachable; without this allow EVERY
    # write verb (new/destroy/apply/upgrade) dies with "docker is required" and
    # doctor goes blind. /info is read-only and low-risk (the host-takeover
    # surface — system/swarm/secrets/etc — stays hard-denied above). Gated on
    # INFO so it stays off unless the admin proxy env sets INFO=1.
    http-request allow if { path,url_dec -m reg -i "^(/v[0-9.]+)?/info\$" } { env(INFO) -m bool }

    # --- Containers (CONTAINERS=1) — NO per-name scoping (admin owns all) ----
    # Covers /containers/json (list), /containers/create, and every
    # /containers/<id>/<verb> (start|stop|kill|restart|wait|logs|top|exec|json|
    # resize|attach|archive|...) plus DELETE /containers/<id> (squadctl
    # destroy/apply `compose down -v`). The squad ACL's containers/create and
    # containers/prune hard-denies are DELIBERATELY absent here.
    http-request allow if { path,url_dec -m reg -i ^(/v[0-9.]+)?/containers } { env(CONTAINERS) -m bool }

    # --- Networks (NETWORKS=1) — create/connect/disconnect/inspect/DELETE ----
    http-request allow if { path,url_dec -m reg -i ^(/v[0-9.]+)?/networks } { env(NETWORKS) -m bool }

    # --- Volumes (VOLUMES=1) — create/inspect/DELETE ------------------------
    http-request allow if { path,url_dec -m reg -i ^(/v[0-9.]+)?/volumes } { env(VOLUMES) -m bool }

    # --- Images (IMAGES=1) — pull/tag/inspect/remove (NOT build) ------------
    # /build is hard-denied above; /images/create (pull) and friends are allowed.
    http-request allow if { path,url_dec -m reg -i ^(/v[0-9.]+)?/images } { env(IMAGES) -m bool }

    # --- Exec continuation endpoints (EXEC=1) -------------------------------
    # /exec/<id>/start|resize|json — the id is minted by a containers/<id>/exec
    # create call already allowed above.
    http-request allow if { path,url_dec -m reg -i "^(/v[0-9.]+)?/exec/[a-zA-Z0-9]+/(start|resize|json)\$" } { env(EXEC) -m bool }

    # Everything else: denied.
    http-request deny
    default_backend dockerbackend

    use_backend docker-events if { path,url_dec -m reg -i ^(/v[0-9.]+)?/events }
