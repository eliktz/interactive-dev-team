# ============================================================================
# War Room tmux configuration — Catppuccin Mocha theme
# Self-contained, no TPM or external plugins required
# Optimized for ttyd (xterm.js) web terminal
# ============================================================================

# --- Terminal & Color Support ---
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm*:Tc"
set -g escape-time 10
set -g focus-events on

# --- General Settings ---
set -g history-limit 50000
set -g display-time 4000
set -g status-interval 5
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g aggressive-resize on
set -g set-titles on
set -g set-titles-string "#S / #W"

# --- Mouse Support ---
set -g mouse on

# --- Prevent apps from overriding pane/window names ---
set -g allow-rename off
set -g automatic-rename off

# --- Clipboard (OSC 52 for web terminals) ---
set -s set-clipboard on
set -g allow-passthrough on
setw -g mode-keys vi

# Vi copy mode bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# Mouse drag auto-copies
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# --- Key Bindings ---
# Toggle mouse (off = free text selection, on = pane switching)
bind m set -g mouse \; display "Mouse: #{?mouse,ON,OFF}"

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Intuitive split keys
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ============================================================================
# THEME: Catppuccin Mocha
# ============================================================================

# --- Pane Borders ---
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"
set -g pane-border-status top
set -g pane-border-format " #{?pane_active,#[fg=#89b4fa]#[bold],#[fg=#6c7086]}#{pane_index}: #{pane_title} #[default]"
set -g pane-border-lines single

# --- Message & Command Styling ---
set -g message-style "fg=#cdd6f4,bg=#313244"
set -g message-command-style "fg=#cdd6f4,bg=#313244"

# --- Copy Mode (Selection Highlight) ---
set -g mode-style "fg=#1e1e2e,bg=#89b4fa"

# --- Status Bar ---
set -g status-position bottom
set -g status-justify left
set -g status-style "fg=#cdd6f4,bg=#181825"
set -g status-left-length 100
set -g status-right-length 100

# Left: session name with powerline arrow
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#313244,nobold]#[fg=#cdd6f4,bg=#313244] #I:#P #[fg=#313244,bg=#181825] "

# Right: date, time, hostname
set -g status-right "#[fg=#313244,bg=#181825]#[fg=#a6adc8,bg=#313244] %Y-%m-%d #[fg=#45475a,bg=#313244]#[fg=#a6adc8,bg=#313244] %H:%M #[fg=#89b4fa,bg=#313244]#[fg=#1e1e2e,bg=#89b4fa,bold] #h "

# Inactive windows
set -g window-status-format "#[fg=#181825,bg=#313244]#[fg=#a6adc8,bg=#313244] #I #W #[fg=#313244,bg=#181825]"

# Active window
set -g window-status-current-format "#[fg=#181825,bg=#b4befe]#[fg=#1e1e2e,bg=#b4befe,bold] #I #W #[fg=#b4befe,bg=#181825]"

set -g window-status-separator ""

# --- Activity ---
set -g window-status-activity-style "fg=#f9e2af,bg=#181825"
set -g window-status-bell-style "fg=#f38ba8,bg=#181825"
setw -g monitor-activity on
set -g visual-activity off

# --- Clock ---
setw -g clock-mode-colour "#89b4fa"
setw -g clock-mode-style 24
