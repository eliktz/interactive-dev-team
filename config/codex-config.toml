# Codex CLI configuration for the Paperclip container.
# Bind-mounted into the paperclip service at /paperclip/.codex/config.toml
# Azure OpenAI routing — verified working against tlk-agents-east-2 on 2026-04-18.
#
# IMPORTANT:
# - api-version is the literal string "preview" (the unified /openai/v1 endpoint
#   does not accept dated versions like "2025-04-01-preview"; that returns HTTP 400).
# - The actual AZURE_OPENAI_API_KEY is NOT in this file. It is passed through the
#   process environment via each agent's adapter_config.env block (or via the
#   paperclip service env in docker-compose.yml for a container-wide default).

model_provider = "azure"
model = "gpt-5.3-codex"

[model_providers.azure]
name = "Azure OpenAI"
base_url = "https://tlk-agents-east-2.cognitiveservices.azure.com/openai/v1"
env_key = "AZURE_OPENAI_API_KEY"
wire_api = "responses"
query_params = { api-version = "preview" }
