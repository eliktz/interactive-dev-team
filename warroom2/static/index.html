<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>War Room 2.0</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2358a6ff' stroke-width='1.8' stroke-linecap='round' stroke-linejoin='round'><rect x='3' y='4' width='18' height='14' rx='2'/><path d='M7 20h10'/><path d='M10 16v4'/><path d='M14 16v4'/></svg>">

<link rel="stylesheet" href="/static/vendor/xterm.css">
<link rel="stylesheet" href="/static/css/warroom2.css?v=20260618a">
<link rel="stylesheet" href="/static/css/tabs.css?v=20260618a">
<link rel="stylesheet" href="/static/css/wizard.css?v=20260618a">

<script src="/static/vendor/xterm.js"></script>
<script src="/static/vendor/addon-fit.js"></script>
<script src="/static/vendor/addon-clipboard.js"></script>

<!-- ?v= asset version: bump on every frontend change so browsers fetch the new
     file instead of a stale cached copy (paired with the no-cache header in app.py). -->
<script src="/static/js/helpers.js?v=20260618a"></script>
<script src="/static/js/state.js?v=20260618a"></script>
<script src="/static/js/ws_client.js?v=20260618a"></script>
<script src="/static/js/tabs.js?v=20260618a"></script>
<script src="/static/js/terminals.js?v=20260618a"></script>
<script src="/static/js/copy_modal.js?v=20260618a"></script>
<script src="/static/js/files.js?v=20260618a"></script>
<script src="/static/js/company.js?v=20260618a"></script>
<script src="/static/js/bus.js?v=20260618a"></script>
<script src="/static/js/wizard.js?v=20260618a"></script>
<script src="/static/js/init.js?v=20260618a"></script>
</head>
<body>
<div id="app">
  <div id="left-panel">
    <div id="left-header">
      <span class="title" id="wr-title">WAR ROOM 2.0</span>
      <button id="btn-mount-agent" class="nav-mount-agent" title="Mount new agent (wizard)">+ Mount agent</button>
      <button id="btn-collapse" title="Collapse">&laquo;</button>
    </div>
    <nav id="admin-nav">
      <button data-section="files" class="active">Files</button>
      <button data-section="company">Company</button>
      <button data-section="bus">Bus log</button>
      <button data-section="health">Health</button>
    </nav>
    <div id="admin-panel">
      <div id="files-section" class="admin-section active"></div>
      <div id="company-section" class="admin-section"></div>
      <div id="bus-section" class="admin-section"></div>
      <div id="health-section" class="admin-section"></div>
    </div>
    <div id="tips-footer">
      <div id="tips-toggle">Tips &#9650;</div>
      <div id="tips-content">
        Cmd/Ctrl+1..4 to switch tabs<br>
        Select text in terminal then auto-copy via OSC 52<br>
        Click "Copy" in tab header if OSC 52 doesn't work
      </div>
    </div>
  </div>
  <div id="pane-divider"></div>
  <div id="right-panel">
    <div id="tab-bar"></div>
    <div id="tab-content"></div>
  </div>
  <div id="copy-modal" hidden>
    <div class="copy-modal-card">
      <h3>Copy buffer</h3>
      <p>Select text below and Cmd-C / Ctrl-C to copy:</p>
      <textarea id="copy-modal-text" readonly autofocus></textarea>
      <button id="copy-modal-close">Close</button>
    </div>
  </div>
</div>
</body>
</html>
